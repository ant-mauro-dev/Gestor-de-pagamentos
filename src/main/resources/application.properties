spring.application.name=gestor-de-pagamentos

spring.datasource.url=jdbc:postgresql://localhost:5432/gestor_de_pagamentos
spring.datasource.username=postgres
spring.datasource.password=sua_senha_aqui

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Chave usada para assinar os tokens JWT (troque em produção; use uma variavel de ambiente)
jwt.secret=troque-esta-chave-por-uma-bem-longa-e-secreta-em-producao-0123456789
# Tempo de expiracao do token em milissegundos (aqui: 24 horas)
jwt.expiration-ms=86400000
